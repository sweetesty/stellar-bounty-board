# Stellar Bounty Board — local dev stack
#
# Health checks ensure `docker compose up` only reports services healthy once
# they actually respond. The frontend uses `depends_on: condition: service_healthy`
# so it waits for the backend to be ready before starting.
#
# - interval: how often to run the check (10s gives quick feedback during boot)
# - timeout:  fail the probe if it takes longer than 5s
# - retries:  N consecutive failures before marking unhealthy
# - start_period: grace period at startup before failures count

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stellar-bounty-backend
    expose:
      - "3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - KEEP_ALIVE_TIMEOUT=65000
      - HEADERS_TIMEOUT=66000
      # Shared cache across replicas (#361); falls back to in-memory if unset.
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: stellar-bounty-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: stellar-bounty-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stellar-bounty-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://nginx
    depends_on:
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
